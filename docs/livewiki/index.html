<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ork LiveWiki</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="SSH-based server automation in Go">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/dark.css">
  <style>
    :root {
      --theme-color: #42b983;
      --theme-color-secondary: #2c3e50;
    }
    .sidebar {
      background-color: #1a1a1a;
    }
    .sidebar-nav a {
      color: #b0b0b0;
    }
    .sidebar-nav a:hover {
      color: var(--theme-color);
    }
    .sidebar-nav li.active > a {
      color: var(--theme-color);
    }
    .markdown-section h1 {
      color: #42b983;
    }
    .markdown-section h2 {
      color: #3eaf7c;
    }
    .markdown-section h3 {
      color: #4dba87;
    }
    .markdown-section code {
      background-color: #2d2d2d;
      color: #e6e6e6;
    }
    .markdown-section pre {
      background-color: #1e1e1e;
    }
    .markdown-section pre > code {
      background-color: transparent;
    }
    .markdown-section blockquote {
      border-left: 4px solid var(--theme-color);
      background-color: #2a2a2a;
    }
    .markdown-section table {
      display: table;
      width: 100%;
    }
    .markdown-section tr:nth-child(2n) {
      background-color: #2a2a2a;
    }
    .markdown-section th {
      background-color: #333;
      color: #fff;
    }
    .search input {
      background-color: #2a2a2a;
      color: #e6e6e6;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Ork LiveWiki',
      repo: 'https://github.com/dracory/ork',
      loadSidebar: true,
      auto2top: true,
      subMaxLevel: 3,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Type to search',
        noData: 'No Results',
        depth: 6
      },
      plugins: [
        function(hook, vm) {
          hook.beforeEach(function(html) {
            if (/githubusercontent\.com/.test(vm.route.file)) {
              url = vm.route.file
                .replace('raw.githubusercontent.com', 'github.com')
                .replace(/\/master/, '/blob/master')
            } else {
              url = 'https://github.com/dracory/ork/blob/master/docs/livewiki/' + vm.route.file
            }
            var editHtml = '[:memo: Edit Document](' + url + ')\n'
            return editHtml + html
          })
        }
      ],
      markdown: {
        mermaid: true
      },
      mermaidConfig: {
        theme: 'dark'
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-mermaid@latest/dist/docsify-mermaid.js"></script>
  <script>mermaid.initialize({ startOnLoad: true, theme: 'dark' });</script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-go.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
</body>
</html>
